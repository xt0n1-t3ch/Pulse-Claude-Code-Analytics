name: 💡 Feature request
description: Suggest an idea for Pulse.
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do? What's frustrating right now?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like Pulse to handle this?
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider scope
      options:
        - Codex
        - Claude
        - Both where capability exists
        - Provider-independent
    validations:
      required: true
  - type: textarea
    id: proof
    attributes:
      label: Acceptance behavior
      description: What observable UI, telemetry, persistence, or runtime result proves completion?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
