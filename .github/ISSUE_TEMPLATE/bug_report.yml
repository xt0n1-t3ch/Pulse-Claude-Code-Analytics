name: 🐛 Bug report
description: Something in Pulse is broken.
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much as you can.
  - type: input
    id: version
    attributes:
      label: Pulse version
      placeholder: "1.0.0 — see top-right of the app"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (Debian/Ubuntu)
        - Linux (Fedora/RHEL)
        - Linux (other / AppImage)
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - Codex
        - Claude
        - Both
        - Not provider-specific
    validations:
      required: true
  - type: dropdown
    id: theme
    attributes:
      label: Theme
      options:
        - Dark
        - Light
        - Both
        - Not visual
    validations:
      required: true
  - type: input
    id: viewport
    attributes:
      label: Window size
      description: For layout issues, include width × height in logical pixels.
      placeholder: "720 × 560"
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open Pulse
        2. Click ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "Debug log lives at `~/.claude/cc-discord-presence-debug.log`. Redact anything sensitive."
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Preflight
      options:
        - label: I reproduced this on the latest published release.
          required: true
        - label: I removed project names, prompts, paths, and credentials from evidence.
          required: true
