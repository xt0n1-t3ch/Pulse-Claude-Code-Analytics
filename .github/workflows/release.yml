name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0). Must already exist.'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build · ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            tauri-args: ''
          - label: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            tauri-args: '--target aarch64-apple-darwin'
          - label: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            tauri-args: '--target x86_64-apple-darwin'
          - label: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            tauri-args: ''

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: release-${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          args: ${{ matrix.tauri-args }}

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          BUNDLE_DIR="target/${{ matrix.target }}/release/bundle"
          [ ! -d "$BUNDLE_DIR" ] && BUNDLE_DIR="target/release/bundle"
          [ ! -d "$BUNDLE_DIR" ] && BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          [ ! -d "$BUNDLE_DIR" ] && BUNDLE_DIR="src-tauri/target/release/bundle"
          echo "Using BUNDLE_DIR=$BUNDLE_DIR"
          if [ -d "$BUNDLE_DIR" ]; then
            find "$BUNDLE_DIR" -type f \( \
              -name '*.exe' -o \
              -name '*.msi' -o \
              -name '*.dmg' -o \
              -name '*.app.tar.gz' -o \
              -name '*.deb' -o \
              -name '*.rpm' -o \
              -name '*.AppImage' \
            \) -exec cp {} dist/ \;
          fi
          ls -lah dist

      - uses: actions/upload-artifact@v4
        with:
          name: pulse-${{ matrix.label }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten + checksum
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          echo "Generated assets:"
          ls -lah

      - name: Compose release body
        id: body
        shell: bash
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          pick() {
            local pat="$1"
            (cd release-assets && ls | grep -i -E "$pat" | head -n1 || true)
          }

          WIN_NSIS=$(pick '\.exe$')
          WIN_MSI=$(pick '\.msi$')
          MAC_ARM=$(pick 'aarch64.*\.dmg$|arm64.*\.dmg$')
          MAC_X64=$(pick 'x64.*\.dmg$|x86_64.*\.dmg$|intel.*\.dmg$')
          LINUX_DEB=$(pick '\.deb$')
          LINUX_RPM=$(pick '\.rpm$')
          LINUX_APP=$(pick '\.AppImage$')

          {
            echo "## Pulse ${TAG}"
            echo
            echo "_Claude Code analytics dashboard + Discord Rich Presence — native desktop, 100% local._"
            echo
            echo "### Downloads"
            echo
            echo "| Platform | Installer |"
            echo "| --- | --- |"
            [ -n "$WIN_NSIS" ] && echo "| Windows (NSIS) | [\`${WIN_NSIS}\`](${BASE}/${WIN_NSIS}) |"
            [ -n "$WIN_MSI" ]  && echo "| Windows (MSI) | [\`${WIN_MSI}\`](${BASE}/${WIN_MSI}) |"
            [ -n "$MAC_ARM" ]  && echo "| macOS (Apple Silicon) | [\`${MAC_ARM}\`](${BASE}/${MAC_ARM}) |"
            [ -n "$MAC_X64" ]  && echo "| macOS (Intel) | [\`${MAC_X64}\`](${BASE}/${MAC_X64}) |"
            [ -n "$LINUX_DEB" ] && echo "| Linux (Debian / Ubuntu) | [\`${LINUX_DEB}\`](${BASE}/${LINUX_DEB}) |"
            [ -n "$LINUX_RPM" ] && echo "| Linux (Fedora / RHEL) | [\`${LINUX_RPM}\`](${BASE}/${LINUX_RPM}) |"
            [ -n "$LINUX_APP" ] && echo "| Linux (AppImage) | [\`${LINUX_APP}\`](${BASE}/${LINUX_APP}) |"
            echo
            echo "Verify any download with [\`SHA256SUMS.txt\`](${BASE}/SHA256SUMS.txt)."
            echo
            echo "### What's new"
            echo
            echo "<!-- gh-auto-notes -->"
            echo
            echo "---"
            echo
            echo "**Full changelog:** https://github.com/${REPO}/compare/...${TAG}"
          } > body.md

          echo "body_path=body.md" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Pulse ${{ github.event.inputs.tag || github.ref_name }}
          body_path: body.md
          append_body: true
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, '-') }}
          files: release-assets/*
          fail_on_unmatched_files: true
