name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0). Must already exist.'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build · ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            tauri-args: ''
          - label: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            tauri-args: '--target aarch64-apple-darwin'
          - label: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            tauri-args: '--target x86_64-apple-darwin'
          - label: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            tauri-args: ''

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: release-${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          args: ${{ matrix.tauri-args }}

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          BUNDLE_DIR="target/${{ matrix.target }}/release/bundle"
          [ ! -d "$BUNDLE_DIR" ] && BUNDLE_DIR="target/release/bundle"
          [ ! -d "$BUNDLE_DIR" ] && BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          [ ! -d "$BUNDLE_DIR" ] && BUNDLE_DIR="src-tauri/target/release/bundle"
          echo "Using BUNDLE_DIR=$BUNDLE_DIR"
          if [ -d "$BUNDLE_DIR" ]; then
            find "$BUNDLE_DIR" -type f \( \
              -name '*.exe' -o \
              -name '*.msi' -o \
              -name '*.dmg' -o \
              -name '*.app.tar.gz' -o \
              -name '*.deb' -o \
              -name '*.rpm' -o \
              -name '*.AppImage' \
            \) -exec cp {} dist/ \;
          fi
          ls -lah dist

      - uses: actions/upload-artifact@v4
        with:
          name: pulse-${{ matrix.label }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten + checksum
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          echo "Generated assets:"
          ls -lah

      - name: Install git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --version

      - name: Compose release notes
        id: notes
        shell: bash
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          python3 scripts/extract-changelog-section.py "$VERSION" CHANGELOG.md > release-body.md || : > release-body.md
          if [ ! -s release-body.md ] || [ "$(wc -c < release-body.md)" -lt 80 ]; then
            echo "CHANGELOG.md section for $VERSION missing or too short; falling back to git-cliff."
            git-cliff --config cliff.toml --tag "$TAG" --strip header --latest -o release-body.md || : > release-body.md
          fi
          if [ ! -s release-body.md ]; then
            printf "Release **%s**.

See the [full changelog](https://github.com/%s/blob/main/CHANGELOG.md) for details.
" "$TAG" "$REPO" > release-body.md
          fi
          echo "::group::release-body.md"
          cat release-body.md
          echo "::endgroup::"
          echo "body_path=release-body.md" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Pulse ${{ github.event.inputs.tag || github.ref_name }}
          body_path: ${{ steps.notes.outputs.body_path }}
          append_body: false
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, '-') }}
          files: release-assets/*
          fail_on_unmatched_files: true
