name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "22"
  NPM_VERSION: "11.10.1"
  RUST_VERSION: "1.96.1"

jobs:
  preflight:
    name: Preflight · Release contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Pin npm
        shell: pwsh
        run: |
          npm install --global "npm@$env:NPM_VERSION"
          if ((npm --version).Trim() -ne $env:NPM_VERSION) { throw "Unexpected npm version" }

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: . -> target
          key: release-preflight

      - name: Verify tag, versions, and changelog
        shell: pwsh
        run: ./scripts/check-release-contract.ps1 -Tag "$env:GITHUB_REF_NAME"

      - name: Verify vendored Codex integrity
        shell: pwsh
        run: ./scripts/check-codex-rich-presence-upstream.ps1

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Check Svelte and TypeScript
        working-directory: frontend
        run: npm run check

      - name: Test frontend
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Lint Rust
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test Rust
        run: cargo test --workspace

      - name: Build Rust workspace
        run: cargo build --workspace --all-targets

  build:
    name: Build · ${{ matrix.label }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            tauri-args: ""
          - label: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            tauri-args: --target aarch64-apple-darwin
          - label: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            tauri-args: --target x86_64-apple-darwin
          - label: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            tauri-args: ""
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev patchelf

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Pin npm
        shell: pwsh
        run: |
          npm install --global "npm@$env:NPM_VERSION"
          if ((npm --version).Trim() -ne $env:NPM_VERSION) { throw "Unexpected npm version" }

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: . -> target
          key: release-${{ matrix.target }}

      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        with:
          projectPath: src-tauri
          args: ${{ matrix.tauri-args }}

      - name: Collect platform artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          BUNDLE_DIR="target/${{ matrix.target }}/release/bundle"
          [ -d "$BUNDLE_DIR" ] || BUNDLE_DIR="target/release/bundle"
          [ -d "$BUNDLE_DIR" ] || BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          [ -d "$BUNDLE_DIR" ] || BUNDLE_DIR="src-tauri/target/release/bundle"
          [ -d "$BUNDLE_DIR" ] || { echo "Tauri bundle directory not found" >&2; exit 1; }
          find "$BUNDLE_DIR" -type f \( \
            -name '*.exe' -o \
            -name '*.msi' -o \
            -name '*.dmg' -o \
            -name '*.app.tar.gz' -o \
            -name '*.deb' -o \
            -name '*.rpm' -o \
            -name '*.AppImage' \
          \) -exec cp {} dist/ \;
          test -n "$(find dist -maxdepth 1 -type f -print -quit)" || { echo "No release assets were produced" >&2; exit 1; }

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pulse-${{ matrix.label }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish immutable release
    needs: [preflight, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts

      - name: Prepare release assets and checksums
        shell: pwsh
        run: ./scripts/release-assets.ps1 -ArtifactsDirectory artifacts -OutputDirectory release-assets

      - name: Extract curated release notes
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          python3 scripts/extract-changelog-section.py "${TAG#v}" CHANGELOG.md > release-body.md
          test -s release-body.md
          test "$(wc -c < release-body.md)" -ge 80

      - name: Publish verified immutable release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; immutable releases are never updated" >&2
            exit 1
          fi

          cleanup_draft() {
            if [[ "$(gh release view "$TAG" --json isDraft --jq .isDraft 2>/dev/null || true)" == "true" ]]; then
              gh release delete "$TAG" --yes
            fi
          }
          trap cleanup_draft ERR

          release_flags=(--draft --verify-tag --title "Pulse $TAG" --notes-file release-body.md)
          if [[ "$TAG" == *-* ]]; then
            release_flags+=(--prerelease --latest=false)
          else
            release_flags+=(--latest)
          fi
          gh release create "$TAG" release-assets/* "${release_flags[@]}"

          test "$(gh release view "$TAG" --json isDraft --jq .isDraft)" = "true"
          find release-assets -maxdepth 1 -type f -printf '%f\n' | sort > expected-assets.txt
          gh release view "$TAG" --json assets --jq '.assets[].name' | sort > actual-assets.txt
          diff -u expected-assets.txt actual-assets.txt

          mkdir verified-assets
          gh release download "$TAG" --dir verified-assets
          (cd verified-assets && sha256sum --check SHA256SUMS.txt)
          gh release edit "$TAG" --draft=false
          trap - ERR
          test "$(gh release view "$TAG" --json isDraft --jq .isDraft)" = "false"
