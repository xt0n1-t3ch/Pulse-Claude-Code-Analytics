[changelog]
header = """

All notable changes to Pulse are documented here.

The format follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{% if version %}\
{% else %}\
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
{% for commit in commits %}
- {{ commit.message | split(pat="\\n") | first | trim }}{% if commit.id %} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/xt0n1-t3ch/Pulse-Claude-Code-Analytics/commit/{{ commit.id }})){% endif %}\
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = [
  { pattern = '\((?:close[sd]?|fix(?:e[sd])?|resolve[sd]?) #(\d+)\)', replace = "([#${1}](https://github.com/xt0n1-t3ch/Pulse-Claude-Code-Analytics/issues/${1}))" },
  { pattern = '\nCo-authored-by:.*', replace = "" },
  { pattern = '\nSigned-off-by:.*',  replace = "" },
]
commit_parsers = [
  { message = "^feat",     group = "Added" },
  { message = "^fix",      group = "Fixed" },
  { message = "^perf",     group = "Changed" },
  { message = "^revert",   group = "Removed" },
  { message = "^deprecat", group = "Deprecated" },
  { message = "^security", group = "Security" },
  { message = "^docs",     skip = true },
  { message = "^style",    skip = true },
  { message = "^refactor", skip = true },
  { message = "^test",     skip = true },
  { message = "^build",    skip = true },
  { message = "^ci",       skip = true },
  { message = "^chore",    skip = true },
  { message = "^Merge",    skip = true },
  { message = "^Bump",     skip = true },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+$"
topo_order = false
sort_commits = "newest"
